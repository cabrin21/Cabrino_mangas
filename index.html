<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CABRINO MANGAS</title>

<style>
body{margin:0;background:#0d0d0d;color:white;font-family:Arial;}
header{padding:15px;background:#141414;color:orange;text-align:center;font-size:22px;}
.search{width:90%;padding:12px;margin:10px auto;display:block;border:none;border-radius:8px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;padding:20px;}
.card{background:#1c1c1c;border-radius:10px;overflow:hidden;cursor:pointer;transition:0.3s;}
.card:hover{transform:scale(1.05);}
.card img{width:100%;height:200px;object-fit:cover;}
.card h3{text-align:center;padding:10px;font-size:14px;}
</style>
</head>

<body>

<header>🔥 CABRINO MANGAS 🔥</header>

<input class="search" id="search" placeholder="🔍 Rechercher un anime...">

<div class="grid" id="list"></div>

<script>
const list=document.getElementById("list");
const search=document.getElementById("search");

function show(data){
  list.innerHTML="";
  data.forEach(a=>{
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`<img src="${a.images.jpg.image_url}"><h3>${a.title}</h3>`;
    c.onclick=()=>location.href="anime.html?id="+a.mal_id;
    list.appendChild(c);
  });
}

// Charger top anime
fetch("https://api.jikan.moe/v4/top/anime")
.then(r=>r.json())
.then(d=>show(d.data));

// Recherche
search.oninput=()=>{
  const q=search.value;

  if(q.length<2){
    fetch("https://api.jikan.moe/v4/top/anime")
    .then(r=>r.json()).then(d=>show(d.data));
    return;
  }

  fetch("https://api.jikan.moe/v4/anime?q="+q)
  .then(r=>r.json())
  .then(d=>show(d.data));
};
</script>

</body>
</html>
