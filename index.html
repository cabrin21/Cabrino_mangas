<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CABRINO MANGAS</title>
<style>
body {margin:0;font-family:Arial;background:#0d0d0d;color:white;}
header {background:#141414;padding:15px;display:flex;justify-content:space-between;align-items:center;}
header h1 {color:orange;margin:0;}
.search {padding:8px;border-radius:5px;border:none;}
.container {padding:20px;}
.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;}
.card {background:#1c1c1c;border-radius:10px;overflow:hidden;text-decoration:none;color:white;transition:0.3s;}
.card:hover {transform:scale(1.05);}
.card img {width:100%;height:220px;object-fit:cover;}
.card h3 {padding:10px;font-size:14px;text-align:center;}
</style>
</head>
<body>
<header>
<h1>🔥 CABRINO MANGAS</h1>
<input class="search" placeholder="Rechercher...">
</header>
<div class="container">
<div class="grid">
<a href="anime.html?anime=naruto" class="card">
<img src="https://i.imgur.com/3GvwNBf.jpg">
<h3>Naruto</h3>
</a>
<a href="anime.html?anime=aot" class="card">
<img src="https://i.imgur.com/8KHKhxk.jpg">
<h3>Attack on Titan</h3>
</a>
<a href="anime.html?anime=demon" class="card">
<img src="https://i.imgur.com/kqjL17C.jpg">
<h3>Demon Slayer</h3>
</a>
</div>
</div>
</body>
</html>
