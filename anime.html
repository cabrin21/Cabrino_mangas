<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anime</title>

<style>
body{margin:0;background:#0d0d0d;color:white;font-family:Arial;}
header{padding:15px;background:#141414;color:orange;text-align:center;font-size:20px;}
.banner img{width:100%;height:230px;object-fit:cover;opacity:0.5;}
.info{padding:15px;}
select,button{width:100%;padding:12px;margin:5px 0;background:#1c1c1c;color:white;border:none;border-radius:6px;}
button:hover{background:orange;color:black;}
iframe{width:100%;height:250px;margin-top:10px;border:none;}
</style>
</head>

<body>

<header>🎬 CABRINO MANGAS</header>

<div class="banner">
  <img id="image">
</div>

<div class="info">
  <h2 id="title"></h2>
  <p id="desc"></p>
</div>

<select id="seasonSelect"></select>
<div id="episodes"></div>
<div id="player"></div>

<script src="database.js"></script>

<script>
const id=new URLSearchParams(location.search).get("id");

// Charger infos anime
fetch("https://api.jikan.moe/v4/anime/"+id)
.then(r=>r.json())
.then(d=>{
  const a=d.data;
  title.innerText=a.title;
  desc.innerText=a.synopsis;
  image.src=a.images.jpg.large_image_url;
  generate(a.episodes || 12);
});

function generate(total){
  let seasons={};
  let per=12;
  let count=Math.ceil(total/per);

  for(let i=1;i<=count;i++){
    seasons["Saison "+i]=new Array(per).fill(null);
  }

  const db=Object.values(ANIME_DB).find(a=>a.id===id);
  if(db){
    Object.keys(db.seasons).forEach(s=>{
      seasons[s]=db.seasons[s];
    });
  }

  init(seasons);
}

function init(seasons){
  seasonSelect.innerHTML="";

  Object.keys(seasons).forEach(s=>{
    const o=document.createElement("option");
    o.value=s;
    o.innerText=s;
    seasonSelect.appendChild(o);
  });

  load(seasons,Object.keys(seasons)[0]);

  seasonSelect.onchange=()=>load(seasons,seasonSelect.value);
}

function load(seasons,s){
  episodes.innerHTML="";

  seasons[s].forEach((ep,i)=>{
    const btn=document.createElement("button");

    if(typeof ep==="object"){
      btn.innerText=ep.title;
    }else{
      btn.innerText=s+" - Episode "+(i+1);
    }

    btn.onclick=()=>{
      if(ep && ep.video){
        player.innerHTML=`<iframe src="${ep.video}" allowfullscreen></iframe>`;
      }else{
        alert("❌ Episode non disponible");
      }
    };

    episodes.appendChild(btn);
  });
}
</script>

</body>
</html>
